# Конфигурация AutoClickerCtS

# Настройки кликера
click_interval: 0.02  # секунд между кликами
click_variance: 5    # разброс в пикселях
consecutive_pause: 50 # кликов до паузы
consecutive_pause_duration: 0.1

# Проверки
upgrade_check_interval: 120  # секунд между проверками улучшений
popup_check_interval: 10   # секунд между проверками всплывающих окон

# Области экрана (будут перезаписаны после калибровки)
main_click_area:
  x: 500
  y: 300

# Настройки улучшений
upgrades:
  panel_open_button: [36, 428]  # координаты кнопки открытия панели
  generator_tab: [140, 45]      # координаты вкладки Генератор
  research_tab: [223, 45]       # координаты вкладки Исследование
  buy_mode_button: [465, 142]    # кнопка выбора режима покупки
  list_region: [10, 179, 546, 893]  # область со списком улучшений
  buy_button_color: [34,76,62]  # RGB зеленого цвета кнопки
  color_threshold: 50            # порог определения цвета

# Астрономические миссии
astronomy:
  first_block_y: 277     # Y координата первого блока
  block_height: 143      # высота одного блока
  block_count: 5         # количество блоков
  button_x: 330          # X координата кнопки сбора
  
  mission_selection:
    first_y: 386         # Y первой миссии в списке
    item_height: 127      # высота одной строки
    item_count: 3        # сколько миссий показывается
    
    type_buttons:
      "Темная материя": [955, 350]
      "Карлик(звезда)": [780, 350]
      "Созвездие": [1060, 350]
      "Скидка": [1140, 350]

# Настройки миссий
missions:
  available:
    - type: "Темная материя"
      name: "Темная материя 1"
      priority: 1
    - type: "Карлик(звезда)"
      name: "Карлик 1"
      priority: 2
    - type: "Созвездие"
      name: "Созвездие Ориона"
      priority: 3
    - type: "Скидка"
      name: "Скидка на улучшения"
      priority: 4
    - type: "Пятый тип"
      name: "Пятая миссия"
      priority: 5

# Настройки OCR
tesseract:
  path: null  # путь к tesseract.exe (если не в PATH)
  languages: "rus+eng"
  config: "--oem 3 --psm 6"

# Логирование
logging:
  file: "logs/autoclicker.log"
  level: "INFO"
  console: true